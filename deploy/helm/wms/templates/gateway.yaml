apiVersion: v1
kind: Service
metadata:
  name: wms-gateway
  namespace: {{ include "wms.namespace" . }}
spec:
  type: NodePort
  ports:
    - name: http
      port: {{ .Values.services.gateway.port }}
      targetPort: {{ .Values.services.gateway.port }}
      nodePort: {{ .Values.service.gatewayNodePort }}
  selector:
    app: wms-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wms-gateway
  namespace: {{ include "wms.namespace" . }}
spec:
  replicas: {{ .Values.replicaCount.gateway }}
  selector:
    matchLabels:
      app: wms-gateway
  template:
    metadata:
      labels:
        app: wms-gateway
    spec:
{{ include "wms.imagePullSecrets" . | indent 6 }}
      containers:
        - name: wms-gateway
          image: {{ include "wms.image" (dict "root" . "imageName" .Values.services.gateway.imageName) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://wms-discovery:8761/eureka/
            - name: EUREKA_INSTANCE_HOSTNAME
              value: wms-gateway
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "false"
            - name: WMS_SYSTEM_SERVICE_URI
              value: http://wms-system-service:{{ .Values.services.system.port }}
            - name: WMS_MASTERDATA_SERVICE_URI
              value: http://wms-masterdata-service:{{ .Values.services.masterdata.port }}
            - name: WMS_BUSINESS_SERVICE_URI
              value: http://wms-business-service:{{ .Values.services.business.port }}
          ports:
            - name: http
              containerPort: {{ .Values.services.gateway.port }}
