apiVersion: v1
kind: Service
metadata:
  name: wms-gateway
  namespace: wms
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: wms-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wms-gateway
  namespace: wms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wms-gateway
  template:
    metadata:
      labels:
        app: wms-gateway
    spec:
      containers:
        - name: wms-gateway
          image: wms/wms-gateway:0.0.1
          imagePullPolicy: IfNotPresent
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://wms-discovery:8761/eureka/
          ports:
            - name: http
              containerPort: 8080
