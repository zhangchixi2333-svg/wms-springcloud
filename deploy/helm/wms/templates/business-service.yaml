apiVersion: v1
kind: Service
metadata:
  name: wms-business-service
  namespace: {{ include "wms.namespace" . }}
spec:
  ports:
    - name: http
      port: {{ .Values.services.business.port }}
      targetPort: {{ .Values.services.business.port }}
  selector:
    app: wms-business-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wms-business-service
  namespace: {{ include "wms.namespace" . }}
spec:
  replicas: {{ .Values.replicaCount.business }}
  selector:
    matchLabels:
      app: wms-business-service
  template:
    metadata:
      labels:
        app: wms-business-service
    spec:
{{ include "wms.imagePullSecrets" . | indent 6 }}
      initContainers:
        - name: wait-for-mysql
          image: {{ .Values.mysql.image | quote }}
          command: ["sh", "-c", "until mysqladmin ping -hmysql -uwms -p\"$MYSQL_PASSWORD\" --silent; do sleep 2; done"]
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wms-mysql-secret
                  key: password
      containers:
        - name: wms-business-service
          image: {{ include "wms.image" (dict "root" . "imageName" .Values.services.business.imageName) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DB_URL
              value: {{ include "wms.dbUrl" . | quote }}
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wms-mysql-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wms-mysql-secret
                  key: password
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://wms-discovery:8761/eureka/
          ports:
            - name: http
              containerPort: {{ .Values.services.business.port }}
