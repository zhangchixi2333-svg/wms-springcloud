apiVersion: batch/v1
kind: Job
metadata:
  name: wms-mysql-init
  namespace: {{ include "wms.namespace" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: wms-mysql-init
    spec:
{{ include "wms.imagePullSecrets" . | indent 6 }}
      restartPolicy: OnFailure
      containers:
        - name: mysql-init
          image: {{ .Values.mysql.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
          args:
            - |
              until mysqladmin ping -hmysql -uroot -p"$MYSQL_ROOT_PASSWORD" --silent; do
                echo "waiting for mysql..."
                sleep 2
              done
              mysql -hmysql -uroot -p"$MYSQL_ROOT_PASSWORD" --default-character-set=utf8mb4 < /docker-entrypoint-initdb.d/wms-cloud-init.sql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wms-mysql-secret
                  key: root-password
          volumeMounts:
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mysql-init
          configMap:
            name: wms-mysql-init
