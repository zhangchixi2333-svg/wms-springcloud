services:
  mysql:
    image: mysql:8.0
    container_name: wms-cloud-mysql
    restart: unless-stopped
    ports:
      - "3317:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: wms_cloud
      MYSQL_USER: wms
      MYSQL_PASSWORD: wms123456
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - wms_cloud_mysql80_data:/var/lib/mysql

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: wms-agent-qdrant
    profiles:
      - rag
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - wms_agent_qdrant_data:/qdrant/storage

  redis:
    image: redis:7.4-alpine
    container_name: wms-agent-redis
    profiles:
      - memory
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - wms_agent_redis_data:/data

volumes:
  wms_cloud_mysql_data:
  wms_cloud_mysql80_data:
  wms_agent_qdrant_data:
  wms_agent_redis_data:
