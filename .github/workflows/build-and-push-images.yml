name: Build Push Deploy WMS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: wms-master-build-deploy
  cancel-in-progress: false

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
  IMAGE_REPOSITORY: ${{ secrets.ACR_IMAGE_REPOSITORY }}
  MAVEN_ACR_TAG: wms-maven-3.9.11-eclipse-temurin-21
  JRE_ACR_TAG: wms-eclipse-temurin-21-jre
  NODE_ACR_TAG: wms-node-24-alpine
  NGINX_ACR_TAG: wms-nginx-1.27-alpine
  MYSQL_ACR_TAG: wms-mysql-8.0
  DEPLOY_NAMESPACE: wms
  DEPLOY_RELEASE: wms
  DEPLOY_PATH: /opt/wms-springcloud
  WMS_INGRESS_ENABLED: ${{ secrets.WMS_INGRESS_ENABLED }}
  WMS_INGRESS_HOST: ${{ secrets.WMS_INGRESS_HOST }}
  WMS_INGRESS_TLS_ENABLED: ${{ secrets.WMS_INGRESS_TLS_ENABLED }}
  WMS_INGRESS_TLS_SECRET: ${{ secrets.WMS_INGRESS_TLS_SECRET }}

jobs:
  prepare-version:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Generate version
        id: version
        shell: bash
        run: |
          VERSION="v${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  mirror-base-images:
    name: Mirror base images to ACR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: maven:3.9.11-eclipse-temurin-21
            tag: wms-maven-3.9.11-eclipse-temurin-21
          - source: eclipse-temurin:21-jre
            tag: wms-eclipse-temurin-21-jre
          - source: node:24-alpine
            tag: wms-node-24-alpine
          - source: nginx:1.27-alpine
            tag: wms-nginx-1.27-alpine
          - source: mysql:8.0
            tag: wms-mysql-8.0
    steps:
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull tag and push ${{ matrix.tag }}
        shell: bash
        run: |
          set -Eeuo pipefail
          TARGET_IMAGE="${IMAGE_REPOSITORY}:${{ matrix.tag }}"
          if docker pull "${TARGET_IMAGE}"; then
            echo "Base image already exists in ACR: ${TARGET_IMAGE}"
            exit 0
          fi

          pulled=false
          for attempt in 1 2 3; do
            if docker pull "${{ matrix.source }}"; then
              pulled=true
              break
            fi
            echo "Pull failed, retry ${attempt}/3"
            sleep $((attempt * 10))
          done
          if [ "${pulled}" != "true" ]; then
            echo "Failed to pull ${{ matrix.source }}"
            exit 1
          fi
          docker tag "${{ matrix.source }}" "${TARGET_IMAGE}"
          docker push "${TARGET_IMAGE}"

  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs:
      - prepare-version
      - mirror-base-images
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: wms-discovery
            dockerfile: deploy/docker/Dockerfile.service
            build_args: |
              MODULE=wms-discovery
          - image_name: wms-gateway
            dockerfile: deploy/docker/Dockerfile.service
            build_args: |
              MODULE=wms-gateway
          - image_name: wms-system-service
            dockerfile: deploy/docker/Dockerfile.service
            build_args: |
              MODULE=wms-system-service
          - image_name: wms-masterdata-service
            dockerfile: deploy/docker/Dockerfile.service
            build_args: |
              MODULE=wms-masterdata-service
          - image_name: wms-business-service
            dockerfile: deploy/docker/Dockerfile.service
            build_args: |
              MODULE=wms-business-service
          - image_name: wms-frontend
            dockerfile: deploy/docker/Dockerfile.frontend
            build_args: |
              VITE_API_BASE=/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            ${{ matrix.build_args }}
            MAVEN_IMAGE=${{ env.IMAGE_REPOSITORY }}:${{ env.MAVEN_ACR_TAG }}
            JRE_IMAGE=${{ env.IMAGE_REPOSITORY }}:${{ env.JRE_ACR_TAG }}
            NODE_IMAGE=${{ env.IMAGE_REPOSITORY }}:${{ env.NODE_ACR_TAG }}
            NGINX_IMAGE=${{ env.IMAGE_REPOSITORY }}:${{ env.NGINX_ACR_TAG }}
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ matrix.image_name }}-${{ needs.prepare-version.outputs.version }}
            ${{ env.IMAGE_REPOSITORY }}:${{ matrix.image_name }}-master
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

  deploy:
    name: Deploy to k3s by Helm
    runs-on: ubuntu-latest
    needs:
      - prepare-version
      - mirror-base-images
      - build-and-push
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare remote deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_PATH }}/deploy/helm"
            rm -rf "${{ env.DEPLOY_PATH }}/deploy/helm/wms"

      - name: Upload Helm chart
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "deploy/helm/wms"
          target: "${{ env.DEPLOY_PATH }}"
          overwrite: true

      - name: Deploy by Helm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          command_timeout: 30m
          envs: IMAGE_REPOSITORY,MYSQL_ACR_TAG,DEPLOY_NAMESPACE,DEPLOY_RELEASE,DEPLOY_PATH,ACR_REGISTRY,ACR_USERNAME,ACR_PASSWORD,WMS_INGRESS_ENABLED,WMS_INGRESS_HOST,WMS_INGRESS_TLS_ENABLED,WMS_INGRESS_TLS_SECRET
          script: |
            set -Eeuo pipefail
            on_error() {
              EXIT_CODE=$?
              echo "Deploy script failed with exit code ${EXIT_CODE}"
              echo "===== Helm list ====="
              helm list -n "${DEPLOY_NAMESPACE}" || true
              echo "===== Helm status ====="
              helm status "${DEPLOY_RELEASE}" -n "${DEPLOY_NAMESPACE}" || true
              echo "===== Pods ====="
              kubectl get pods -n "${DEPLOY_NAMESPACE}" -o wide || true
              echo "===== Jobs ====="
              kubectl get jobs -n "${DEPLOY_NAMESPACE}" || true
              echo "===== Events ====="
              kubectl get events -n "${DEPLOY_NAMESPACE}" --sort-by=.lastTimestamp | tail -n 50 || true
              echo "===== MySQL describe ====="
              kubectl describe statefulset mysql -n "${DEPLOY_NAMESPACE}" || true
              kubectl describe pod mysql-0 -n "${DEPLOY_NAMESPACE}" || true
              echo "===== MySQL logs ====="
              kubectl logs mysql-0 -n "${DEPLOY_NAMESPACE}" --tail=200 || true
              echo "===== MySQL init logs ====="
              kubectl logs job/wms-mysql-init -n "${DEPLOY_NAMESPACE}" --tail=200 || true
              echo "===== Service logs ====="
              kubectl logs deploy/wms-discovery -n "${DEPLOY_NAMESPACE}" --tail=100 || true
              kubectl logs deploy/wms-gateway -n "${DEPLOY_NAMESPACE}" --tail=100 || true
              kubectl logs deploy/wms-system-service -n "${DEPLOY_NAMESPACE}" --tail=100 || true
              kubectl logs deploy/wms-masterdata-service -n "${DEPLOY_NAMESPACE}" --tail=100 || true
              kubectl logs deploy/wms-business-service -n "${DEPLOY_NAMESPACE}" --tail=100 || true
              kubectl logs deploy/wms-frontend -n "${DEPLOY_NAMESPACE}" --tail=100 || true
              exit "${EXIT_CODE}"
            }
            trap on_error ERR
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            VERSION="${{ needs.prepare-version.outputs.version }}"

            echo "Deploy version: ${VERSION}"
            echo "Image repository: ${IMAGE_REPOSITORY}"
            echo "MySQL image: ${IMAGE_REPOSITORY}:${MYSQL_ACR_TAG}"
            echo "Helm chart path: ${DEPLOY_PATH}/deploy/helm/wms"
            echo "Ingress enabled: ${WMS_INGRESS_ENABLED:-false}"
            echo "Ingress host: ${WMS_INGRESS_HOST:-}"

            kubectl create namespace "${DEPLOY_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
            kubectl delete secret aliyun-acr -n "${DEPLOY_NAMESPACE}" --ignore-not-found
            kubectl create secret docker-registry aliyun-acr \
              -n "${DEPLOY_NAMESPACE}" \
              --docker-server="${ACR_REGISTRY}" \
              --docker-username="${ACR_USERNAME}" \
              --docker-password="${ACR_PASSWORD}"

            if helm status "${DEPLOY_RELEASE}" -n "${DEPLOY_NAMESPACE}" >/tmp/helm-status.txt 2>/tmp/helm-status.err; then
              STATUS_LINE=$(awk '/^STATUS:/ {print $2; exit}' /tmp/helm-status.txt)
              if echo "${STATUS_LINE}" | grep -Eq '^pending-(install|upgrade|rollback)$'; then
                echo "Helm release is in pending state: ${STATUS_LINE}"
                helm history "${DEPLOY_RELEASE}" -n "${DEPLOY_NAMESPACE}" || true
                LAST_GOOD_REVISION=$(helm history "${DEPLOY_RELEASE}" -n "${DEPLOY_NAMESPACE}" -o json | python3 -c 'import json,sys; data=json.load(sys.stdin); good=[str(item.get("revision","")) for item in data if item.get("status") in ("deployed","superseded") and item.get("revision") is not None]; print(good[-1] if good else "")')
                if [ -n "${LAST_GOOD_REVISION}" ]; then
                  echo "Rollback to revision ${LAST_GOOD_REVISION}"
                  helm rollback "${DEPLOY_RELEASE}" "${LAST_GOOD_REVISION}" -n "${DEPLOY_NAMESPACE}" --wait --timeout 10m
                else
                  echo "No usable revision found for rollback"
                  cat /tmp/helm-status.txt || true
                  exit 1
                fi
              fi
            else
              cat /tmp/helm-status.err || true
            fi

            test -d "${DEPLOY_PATH}/deploy/helm/wms"
            ls -la "${DEPLOY_PATH}/deploy/helm/wms"
            cat "${DEPLOY_PATH}/deploy/helm/wms/Chart.yaml"
            echo "===== Helm lint ====="
            helm lint "${DEPLOY_PATH}/deploy/helm/wms"

            HELM_INGRESS_ARGS=""
            if [ "${WMS_INGRESS_ENABLED:-false}" = "true" ]; then
              HELM_INGRESS_ARGS="${HELM_INGRESS_ARGS} --set ingress.enabled=true"
              if [ -n "${WMS_INGRESS_HOST:-}" ]; then
                HELM_INGRESS_ARGS="${HELM_INGRESS_ARGS} --set ingress.host=${WMS_INGRESS_HOST}"
              fi
              if [ "${WMS_INGRESS_TLS_ENABLED:-false}" = "true" ]; then
                HELM_INGRESS_ARGS="${HELM_INGRESS_ARGS} --set ingress.tls.enabled=true"
                if [ -n "${WMS_INGRESS_TLS_SECRET:-}" ]; then
                  HELM_INGRESS_ARGS="${HELM_INGRESS_ARGS} --set ingress.tls.secretName=${WMS_INGRESS_TLS_SECRET}"
                fi
              fi
            fi

            echo "===== Helm upgrade ====="
            set +e
            helm upgrade --install "${DEPLOY_RELEASE}" "${DEPLOY_PATH}/deploy/helm/wms" \
              -n "${DEPLOY_NAMESPACE}" \
              --create-namespace \
              --set "image.repository=${IMAGE_REPOSITORY}" \
              --set "image.tag=${VERSION}" \
              --set "mysql.image=${IMAGE_REPOSITORY}:${MYSQL_ACR_TAG}" \
              --set "image.pullSecrets[0].name=aliyun-acr" \
              ${HELM_INGRESS_ARGS} \
              >/tmp/helm-upgrade.log 2>&1
            HELM_EXIT=$?
            set -e
            cat /tmp/helm-upgrade.log
            if [ "${HELM_EXIT}" -ne 0 ]; then
              echo "Helm upgrade failed with exit code ${HELM_EXIT}"
              exit "${HELM_EXIT}"
            fi

            kubectl get pods -n "${DEPLOY_NAMESPACE}" || true
            kubectl get statefulset mysql -n "${DEPLOY_NAMESPACE}" -o jsonpath='{.spec.template.spec.containers[0].image}'; echo
            kubectl rollout status statefulset/mysql -n "${DEPLOY_NAMESPACE}" --timeout=600s
            kubectl wait --for=condition=Ready pod/mysql-0 -n "${DEPLOY_NAMESPACE}" --timeout=600s

            kubectl get job -n "${DEPLOY_NAMESPACE}" || true
            kubectl wait --for=condition=complete job/wms-mysql-init -n "${DEPLOY_NAMESPACE}" --timeout=600s
            kubectl logs job/wms-mysql-init -n "${DEPLOY_NAMESPACE}" --tail=100 || true

            kubectl rollout status deployment/wms-discovery -n "${DEPLOY_NAMESPACE}" --timeout=600s
            kubectl rollout status deployment/wms-gateway -n "${DEPLOY_NAMESPACE}" --timeout=600s
            kubectl rollout status deployment/wms-system-service -n "${DEPLOY_NAMESPACE}" --timeout=600s
            kubectl rollout status deployment/wms-masterdata-service -n "${DEPLOY_NAMESPACE}" --timeout=600s
            kubectl rollout status deployment/wms-business-service -n "${DEPLOY_NAMESPACE}" --timeout=600s
            kubectl rollout status deployment/wms-frontend -n "${DEPLOY_NAMESPACE}" --timeout=600s

            kubectl get pods -n "${DEPLOY_NAMESPACE}"
