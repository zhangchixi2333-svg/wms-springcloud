name: Build and Push WMS Images

on:
  push:
    branches:
      - master

env:
  IMAGE_REPOSITORY: ${{ secrets.ACR_IMAGE_REPOSITORY }}
  DEPLOY_NAMESPACE: wms
  DEPLOY_RELEASE: wms
  DEPLOY_PATH: /opt/wms-springcloud

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: wms-discovery
            module: wms-discovery
            dockerfile: deploy/docker/Dockerfile.service
            build_args: |
              MODULE=wms-discovery
          - image_name: wms-gateway
            module: wms-gateway
            dockerfile: deploy/docker/Dockerfile.service
            build_args: |
              MODULE=wms-gateway
          - image_name: wms-system-service
            module: wms-system-service
            dockerfile: deploy/docker/Dockerfile.service
            build_args: |
              MODULE=wms-system-service
          - image_name: wms-masterdata-service
            module: wms-masterdata-service
            dockerfile: deploy/docker/Dockerfile.service
            build_args: |
              MODULE=wms-masterdata-service
          - image_name: wms-business-service
            module: wms-business-service
            dockerfile: deploy/docker/Dockerfile.service
            build_args: |
              MODULE=wms-business-service
          - image_name: wms-frontend
            module: frontend
            dockerfile: deploy/docker/Dockerfile.frontend
            build_args: |
              VITE_API_BASE=/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: meta
        shell: bash
        run: |
          VERSION="v${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${{ matrix.image_name }}-${VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${{ matrix.image_name }}-master" >> "$GITHUB_OUTPUT"

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.meta.outputs.version_tag }}
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.meta.outputs.branch_tag }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

  deploy:
    name: Deploy to cloud server
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deploy version
        id: version
        shell: bash
        run: |
          echo "tag=v${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Prepare remote deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            rm -rf ${{ env.DEPLOY_PATH }}/deploy/helm/wms
            mkdir -p ${{ env.DEPLOY_PATH }}/deploy/helm

      - name: Upload Helm chart
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "deploy/helm/wms"
          target: "${{ env.DEPLOY_PATH }}"
          overwrite: true

      - name: Deploy by Helm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            helm upgrade --install ${{ env.DEPLOY_RELEASE }} ${{ env.DEPLOY_PATH }}/deploy/helm/wms \
              -n ${{ env.DEPLOY_NAMESPACE }} \
              --create-namespace \
              --set "image.repository=${{ env.IMAGE_REPOSITORY }}" \
              --set "image.tag=${{ steps.version.outputs.tag }}" \
              --set "image.pullSecrets[0].name=aliyun-acr"

            kubectl rollout status statefulset/mysql -n ${{ env.DEPLOY_NAMESPACE }} --timeout=300s
            kubectl wait --for=condition=Ready pod/mysql-0 -n ${{ env.DEPLOY_NAMESPACE }} --timeout=300s

            kubectl rollout status deployment/wms-discovery -n ${{ env.DEPLOY_NAMESPACE }} --timeout=300s
            kubectl rollout status deployment/wms-gateway -n ${{ env.DEPLOY_NAMESPACE }} --timeout=300s
            kubectl rollout status deployment/wms-system-service -n ${{ env.DEPLOY_NAMESPACE }} --timeout=300s
            kubectl rollout status deployment/wms-masterdata-service -n ${{ env.DEPLOY_NAMESPACE }} --timeout=300s
            kubectl rollout status deployment/wms-business-service -n ${{ env.DEPLOY_NAMESPACE }} --timeout=300s
            kubectl rollout status deployment/wms-frontend -n ${{ env.DEPLOY_NAMESPACE }} --timeout=300s
