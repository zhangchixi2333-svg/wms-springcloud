server:
  port: 8080
  ssl:
    enabled: ${WMS_GATEWAY_SSL_ENABLED:false}
    key-store: ${WMS_GATEWAY_SSL_KEY_STORE:}
    key-store-password: ${WMS_GATEWAY_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${WMS_GATEWAY_SSL_KEY_STORE_TYPE:PKCS12}

spring:
  application:
    name: wms-gateway
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials,RETAIN_FIRST
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - http://localhost:*
                  - http://127.0.0.1:*
                  - http://192.168.*:*
                  - http://10.*:*
                  - http://172.16.*:*
                  - http://172.17.*:*
                  - http://172.18.*:*
                  - http://172.19.*:*
                  - http://172.2*.*:*
                  - http://172.30.*:*
                  - http://172.31.*:*
                  - https://localhost:*
                  - https://127.0.0.1:*
                  - https://192.168.*:*
                  - https://10.*:*
                  - https://172.16.*:*
                  - https://172.17.*:*
                  - https://172.18.*:*
                  - https://172.19.*:*
                  - https://172.2*.*:*
                  - https://172.30.*:*
                  - https://172.31.*:*
                  - http://8.138.198.245:30081
                  - https://8.138.198.245:30081
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - '*'
          routes:
            - id: wms-system-service
              uri: ${WMS_SYSTEM_SERVICE_URI:lb://wms-system-service}
              predicates:
                - Path=/api/auth/**,/api/menus/**,/api/users/**,/api/roles/**,/api/config-items/**
            - id: wms-masterdata-service
              uri: ${WMS_MASTERDATA_SERVICE_URI:lb://wms-masterdata-service}
              predicates:
                - Path=/api/suppliers/**,/api/customers/**,/api/equipment/**,/api/parts/**,/api/locations/**
            - id: wms-business-service
              uri: ${WMS_BUSINESS_SERVICE_URI:lb://wms-business-service}
              predicates:
                - Path=/api/inbound-orders/**,/api/outbound-orders/**,/api/kanbans/**,/api/inventory/**,/api/mobile/scan/**

eureka:
  client:
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka/
