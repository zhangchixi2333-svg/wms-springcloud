apiVersion: v1
kind: Service
metadata:
  name: wms-masterdata-service
  namespace: wms
spec:
  ports:
    - name: http
      port: 8083
      targetPort: 8083
  selector:
    app: wms-masterdata-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wms-masterdata-service
  namespace: wms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wms-masterdata-service
  template:
    metadata:
      labels:
        app: wms-masterdata-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: mysql:8.4
          command:
            - sh
            - -c
            - until mysqladmin ping -hmysql -uwms -p"$MYSQL_PASSWORD" --silent; do sleep 2; done
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wms-mysql-secret
                  key: password
      containers:
        - name: wms-masterdata-service
          image: wms/wms-masterdata-service:0.0.1
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_URL
              value: jdbc:mysql://mysql:3306/wms_cloud?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wms-mysql-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wms-mysql-secret
                  key: password
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://wms-discovery:8761/eureka/
          ports:
            - name: http
              containerPort: 8083
